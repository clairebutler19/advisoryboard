  <style>
    :root {
      --blue:#0052F2;--blue-dark:#001A4F;--blue-mid:#1A3FAF;--blue-light:#EEF3FF;
      --black:#08090A;--white:#FFFFFF;
      --g05:#F7F8FA;--g10:#F0F2F5;--g20:#DDE1E9;--g40:#B0B8C4;--g60:#6B7280;--g80:#374151;
      --green:#16A34A;--green-bg:rgba(22,163,74,0.09);
      --amber:#D97706;--amber-bg:rgba(217,119,6,0.09);
      --red:#DC2626;--red-bg:rgba(220,38,38,0.09);
      --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
      --r:10px;--r-sm:7px;
      --shadow:0 2px 8px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg:0 8px 28px rgba(0,0,0,0.11),0 2px 6px rgba(0,0,0,0.06);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--g05);color:var(--black);-webkit-font-smoothing:antialiased;min-height:100vh}

    /* ── HEADER ── */
    .hdr{background:var(--blue-dark);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200}
    .hdr-l{display:flex;align-items:center;gap:12px}
    .hdr-logo{display:flex;align-items:center;gap:8px}
    .hdr-wm{font-family:var(--font-h);font-weight:700;font-size:15px;color:#fff;letter-spacing:-.2px}
    .hdr-div{width:1px;height:18px;background:rgba(255,255,255,.2)}
    .hdr-sub{font-size:13px;color:rgba(255,255,255,.55)}
    .hdr-conf{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);background:rgba(255,255,255,.1);padding:3px 10px;border-radius:99px;letter-spacing:.06em}

    /* ── TOOLBAR ── */
    .toolbar{background:#fff;border-bottom:1px solid var(--g20);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:54px;z-index:100}
    .fl{display:flex;align-items:center;gap:8px}
    .fl-label{font-size:10px;font-weight:700;color:var(--g60);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
    .pills{display:flex;gap:5px;flex-wrap:wrap}
    .pill{font-family:var(--font-b);font-size:12px;font-weight:500;padding:4px 11px;border-radius:99px;border:1.5px solid var(--g20);background:#fff;color:var(--g60);cursor:pointer;transition:all .15s;white-space:nowrap}
    .pill:hover{border-color:var(--blue);color:var(--blue)}
    .pill.on{background:var(--blue);border-color:var(--blue);color:#fff}
    .tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
    .sw{position:relative}
    .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g40);pointer-events:none}
    .sb{font-family:var(--font-b);font-size:13px;padding:6px 11px 6px 30px;border-radius:8px;border:1.5px solid var(--g20);background:var(--g05);outline:none;width:210px;color:var(--black)}
    .sb:focus{border-color:var(--blue);background:#fff}
    .stat{font-size:12px;color:var(--g60);white-space:nowrap}
    .stat strong{color:var(--black)}
    .refresh-btn{font-family:var(--font-b);font-size:12px;font-weight:600;padding:5px 13px;border-radius:7px;border:1.5px solid var(--blue);background:var(--blue-light);color:var(--blue);cursor:pointer;transition:all .15s}
    .refresh-btn:hover{background:var(--blue);color:#fff}

    /* ── MAIN ── */
    .main{padding:24px 28px 60px;max-width:1440px;margin:0 auto}

    /* ── EVENT SECTION ── */
    .event-section{margin-bottom:40px}
    .event-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--g20)}
    .event-title{font-family:var(--font-h);font-size:20px;font-weight:800;color:var(--black);letter-spacing:-.3px}
    .event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .event-count{font-size:12px;color:var(--g60);margin-left:2px}
    .event-dates{font-size:11px;color:var(--g40);margin-left:auto;font-weight:500}

    /* ── CARDS GRID ── */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

    /* ── CUSTOMER CARD ── */
    .ccard{background:#fff;border-radius:var(--r);border:1px solid var(--g20);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s,border-color .2s}
    .ccard:hover{box-shadow:var(--shadow-lg);border-color:var(--blue)}
    .ccard.open{border-color:var(--blue);box-shadow:var(--shadow-lg)}

    .ccard-top{padding:14px 16px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:11px}
    .av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:13px;font-weight:700;flex-shrink:0;border:2px solid rgba(0,0,0,.06)}
    .cinfo{flex:1;min-width:0}
    .cname{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--black);line-height:1.2}
    .ctitle{font-size:11px;color:var(--g60);margin-top:1px;line-height:1.3}
    .cco{font-size:12px;font-weight:600;color:var(--g80);margin-top:2px}
    .chevron{flex-shrink:0;margin-top:3px;color:var(--g40);transition:transform .2s;font-size:12px}
    .ccard.open .chevron{transform:rotate(180deg)}

    .ccard-meta{padding:0 16px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .cm{background:var(--g05);border-radius:var(--r-sm);padding:7px 9px}
    .cm-l{font-size:9px;font-weight:700;color:var(--g40);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
    .cm-v{font-size:12px;font-weight:700;color:var(--black)}
    .cm-v.gr{color:var(--green)}.cm-v.am{color:var(--amber)}.cm-v.rd{color:var(--red)}

    .ccard-ae{padding:0 16px 10px;font-size:11px;color:var(--g60)}
    .ccard-ae span{font-weight:600;color:var(--g80)}


    /* ── DROPDOWN DETAIL ── */
    .detail{display:none;border-top:1px solid var(--g10)}
    .ccard.open .detail{display:block}
    .d-body{padding:14px 16px}
    .d-sec{margin-bottom:14px}
    .d-sec:last-child{margin-bottom:0}
    .d-lbl{font-size:10px;font-weight:700;color:var(--g40);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
    .d-txt{font-size:12px;color:var(--g80);line-height:1.6;background:var(--g05);border-radius:var(--r-sm);padding:9px 11px}
    .d-txt.warn{background:var(--amber-bg);border:1px solid rgba(217,119,6,.2);color:var(--g80)}
    .d-tags{display:flex;flex-wrap:wrap;gap:5px}
    .d-tag{font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;background:var(--blue-light);color:var(--blue)}
    .d-tag.exec{background:var(--blue-dark);color:#fff}
    .d-tag.prod{background:var(--g10);color:var(--g60)}
    .peer-item{background:var(--g05);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:5px}
    .peer-item:last-child{margin-bottom:0}
    .peer-nm{font-size:12px;font-weight:700;color:var(--black)}
    .peer-rs{font-size:11px;color:var(--g60);margin-top:1px}
    .no-brief{background:var(--g10);border-radius:var(--r-sm);padding:12px;text-align:center;font-size:12px;color:var(--g40);font-style:italic}

    /* ── EXEC SPOTLIGHT SECTION ── */
    .spotlight-wrap{margin-bottom:40px}
    .spotlight-title{font-family:var(--font-h);font-size:20px;font-weight:800;letter-spacing:-.3px;color:var(--black);margin-bottom:4px}
    .spotlight-sub{font-size:13px;color:var(--g60);margin-bottom:18px}
    .exec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .exec-card{background:#fff;border-radius:var(--r);border:1px solid var(--g20);box-shadow:var(--shadow);overflow:hidden}
    .exec-card-hdr{background:var(--blue-dark);padding:12px 16px;display:flex;align-items:center;gap:10px}
    .exec-av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .exec-nm{font-family:var(--font-h);font-size:14px;font-weight:700;color:#fff}
    .exec-role{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
    .exec-events{display:flex;gap:4px;margin-left:auto}
    .exec-ev-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
    .top5-list{padding:12px 16px}
    .t5-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--g10)}
    .t5-item:last-child{border-bottom:none}
    .t5-rank{font-family:var(--font-h);font-size:16px;font-weight:800;color:var(--g20);width:20px;flex-shrink:0;line-height:1}
    .t5-info{flex:1;min-width:0}
    .t5-name{font-size:13px;font-weight:700;color:var(--black)}
    .t5-co{font-size:11px;color:var(--g60)}
    .t5-note{font-size:11px;color:var(--g80);margin-top:3px;line-height:1.4}
    .t5-arr{font-size:11px;font-weight:700;color:var(--blue);white-space:nowrap}
    .no-assigns{padding:16px;text-align:center;font-size:12px;color:var(--g40);font-style:italic}

    /* ── STATES ── */
    .state-msg{text-align:center;padding:80px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
    .spin{width:30px;height:30px;border:3px solid var(--g20);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .ccard{animation:fadeUp .25s ease both}
  </style>
</head>

// ── HELPERS ─────────────────────────────────────────────────────────────────
const AC = [["#0052F2","#EEF3FF"],["#16A34A","#F0FDF4"],["#D97706","#FFFBEB"],["#7C3AED","#F5F3FF"],["#DB2777","#FDF2F8"],["#0891B2","#ECFEFF"],["#374151","#F3F4F6"],["#DC2626","#FEF2F2"]];
function avc(n){return AC[n.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%AC.length]}
function ini(n){return n.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase()}
function hcl(s){return s>=75?"gr":s>=55?"am":"rd"}
function parseJSON(s,def){try{return JSON.parse(s||"[]")}catch(e){return def}}
function arrToNum(s){if(!s)return 0;return parseFloat(s.replace(/[$KMB,]/g,s=>s==="K"?"":(s==="M"?"000":(s==="B"?"000000":""))))||0}

// ── STATE ────────────────────────────────────────────────────────────────────
let allBriefs=[], fev="all", fex="all", fq="";

function findBrief(a){
  return allBriefs.find(b=>b.customer_name&&a.customer&&
    b.customer_name.toLowerCase().trim()===a.customer.toLowerCase().trim())||null;
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadBriefs(){
  document.getElementById("main").innerHTML='<div class="state-msg"><div class="spin"></div><div style="font-family:var(--font-h);font-size:17px;font-weight:700">Loading briefs…</div></div>';
  document.getElementById("stat-bar").textContent="Loading…";
  try{
    const res=await fetch(SHEETS_URL+"?action=get_briefs");
    const text=await res.text();
    let d;try{d=JSON.parse(text)}catch(e){d={rows:[]}}
    allBriefs=d.rows||[];
  }catch(e){allBriefs=[]}
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const q=fq.toLowerCase();
  const visible=ALL.filter(a=>{
    const b=findBrief(a);
    const em=b?(b.exec_matches_str||b.exec_matches||""):"";
    if(fev!=="all"&&a.event!==fev)return false;
    if(fex!=="all"&&!em.includes(fex))return false;
    if(q&&![a.customer,a.company,a.ae].join(" ").toLowerCase().includes(q))return false;
    return true;
  });

  const briefed=visible.filter(a=>findBrief(a)).length;
  document.getElementById("stat-bar").innerHTML=`<strong>${visible.length}</strong> accounts &nbsp;·&nbsp; <strong style="color:var(--green)">${briefed}</strong> with brief`;

  const main=document.getElementById("main");
  main.innerHTML="";

  // ── EXEC SPOTLIGHT ──
  if(fex!=="all"){
    const exec=EXECS.find(e=>e.id===fex);
    if(exec) main.appendChild(buildExecSpotlight([exec], visible));
  } else if(fev==="all"||fev) {
    const relevantExecs=EXECS.filter(e=>{
      if(fev==="all")return true;
      return e.events.includes(fev);
    });
    main.appendChild(buildExecSpotlight(relevantExecs, visible));
  }

  // ── EVENT SECTIONS ──
  const eventsToShow = fev==="all" ? EVENTS : EVENTS.filter(e=>e.key===fev);
  eventsToShow.forEach(ev=>{
    const cards=visible.filter(a=>a.event===ev.key);
    if(cards.length===0)return;
    const sec=document.createElement("div");
    sec.className="event-section";
    const briefedCount=cards.filter(a=>findBrief(a)).length;
    sec.innerHTML=`
      <div class="event-hdr">
        <div class="event-dot" style="background:${ev.color}"></div>
        <div class="event-title">${ev.icon} ${ev.key}</div>
        <span class="event-count">${cards.length} attendees · ${briefedCount} briefed</span>
        <span class="event-dates">${ev.dates}</span>
      </div>
      <div class="cards-grid" id="grid-${ev.key.replace(/\s+/g,'-')}"></div>
    `;
    main.appendChild(sec);
    const grid=sec.querySelector(".cards-grid");
    cards.forEach((a,i)=>{
      grid.appendChild(buildCard(a, findBrief(a), i));
    });
  });

  if(main.children.length===0||(main.children.length===1&&main.querySelector(".spotlight-wrap"))){
    const empty=document.createElement("div");
    empty.className="state-msg";
    empty.innerHTML='<div style="font-size:32px">🔍</div><div style="font-family:var(--font-h);font-size:17px;font-weight:700">No results</div><div style="font-size:13px;color:var(--g60)">Try adjusting your filters.</div>';
    main.appendChild(empty);
  }
}

// ── EXEC SPOTLIGHT ────────────────────────────────────────────────────────────
function buildExecSpotlight(execs, visible){
  const wrap=document.createElement("div");
  wrap.className="spotlight-wrap";
  wrap.innerHTML=`
    <div class="spotlight-title">Top Executive Connections</div>
    <div class="spotlight-sub">Requested by account teams — customers AEs specifically asked each exec to connect with. Sorted by AE priority request, then ARR.</div>
    <div class="exec-grid" id="exec-grid"></div>
  `;
  const grid=wrap.querySelector("#exec-grid");
  execs.forEach(exec=>{
    // Pull ONLY customers whose AE explicitly requested this exec in their brief
    const assigned=visible.filter(a=>{
      const b=findBrief(a);
      if(!b)return false;
      // Check exec_matches JSON array first (structured data)
      let matched=false;
      try{
        const parsed=JSON.parse(b.exec_matches||"[]");
        matched=parsed.some(e=>e.name&&e.name.includes(exec.id.split(" ")[0]));
      }catch(e){}
      // Fall back to string match on exec_matches_str
      if(!matched){
        const em=b.exec_matches_str||"";
        matched=em.includes(exec.id);
      }
      return matched;
    });

    // Sort: first by whether AE left specific important_convos note (signal of priority),
    // then by outcome field presence, then by ARR
    const sorted=[...assigned].sort((a,b_)=>{
      const ab=findBrief(a), bb=findBrief(b_);
      const aHasConvo=ab&&ab.important_convos&&ab.important_convos.length>5?1:0;
      const bHasConvo=bb&&bb.important_convos&&bb.important_convos.length>5?1:0;
      if(bHasConvo!==aHasConvo)return bHasConvo-aHasConvo;
      const aHasOutcome=ab&&ab.outcome&&ab.outcome!=="[skipped]"&&ab.outcome.length>5?1:0;
      const bHasOutcome=bb&&bb.outcome&&bb.outcome!=="[skipped]"&&bb.outcome.length>5?1:0;
      if(bHasOutcome!==aHasOutcome)return bHasOutcome-aHasOutcome;
      // Tiebreak by ARR
      const toNum=s=>parseFloat((s||"0").replace(/[$,]/g,"").replace("K","000").replace("M","000000"))||0;
      return toNum(b_.arr)-toNum(a.arr);
    }).slice(0,5);

    const evBadges=exec.events.map(e=>{
      const em=EVENTS.find(ev=>ev.key===e);
      return em?`<span class="exec-ev-badge">${em.icon} ${em.key.replace("San Diego ","SD ").replace(" CAB","").replace(" EAB","")}</span>`:"";
    }).join("");

    const card=document.createElement("div");
    card.className="exec-card";
    card.innerHTML=`
      <div class="exec-card-hdr">
        <div class="exec-av">${ini(exec.id)}</div>
        <div><div class="exec-nm">${exec.id}</div><div class="exec-role">${exec.role}</div></div>
        <div class="exec-events">${evBadges}</div>
      </div>
      <div class="top5-list">
        ${sorted.length===0
          ?`<div class="no-assigns">No specific connection requests yet — populate as AEs submit briefs.</div>`
          :sorted.map((a,i)=>{
            const b=findBrief(a);
            const risk=RISKS[a.company]||"";
            // Show AE's specific note about this exec connection if they left one,
            // otherwise show the desired outcome, otherwise show risk flag
            const convoNote=b&&b.important_convos&&b.important_convos.length>5?b.important_convos.slice(0,100)+(b.important_convos.length>100?"…":""):null;
            const outcomeNote=b&&b.outcome&&b.outcome!=="[skipped]"&&b.outcome.length>5?b.outcome.slice(0,90)+(b.outcome.length>90?"…":""):null;
            const note=convoNote||outcomeNote||(risk?"⚠️ "+risk.slice(0,80):"");
            const noteLabel=convoNote?"💬 AE note:":outcomeNote?"🎯 Goal:":"";
            return `<div class="t5-item">
              <div class="t5-rank">${i+1}</div>
              <div class="t5-info">
                <div class="t5-name">${a.customer}</div>
                <div class="t5-co">${a.company} · ${a.event.replace("San Diego ","SD ").replace(" CAB"," CAB").replace(" EAB"," EAB")} · AE: ${a.ae.split(" ")[0]} ${a.ae.split(" ").slice(-1)[0]}</div>
                ${note?`<div class="t5-note"><span style="font-weight:600;color:var(--blue);margin-right:3px">${noteLabel}</span>${note}</div>`:""}
              </div>
              <div class="t5-arr">${a.arr}</div>
            </div>`;
          }).join("")}
      </div>
    `;
    grid.appendChild(card);
  });
  return wrap;
}

        ${b.important_convos&&b.important_convos.length>2?`
        <div class="d-sec">
          <div class="d-lbl">📌 Important conversations to engineer</div>
          <div class="d-txt" style="border:1px solid rgba(0,82,242,0.2);background:rgba(0,82,242,0.04)">${b.important_convos}</div>
        </div>`:""}
        ${prods.length>0?`
        <div class="d-sec">
          <div class="d-lbl">💬 Topics they submitted at RSVP</div>
          <div class="d-tags">${prods.map(t=>`<span class="d-tag">${t}</span>`).join("")}</div>
        </div>`:""}
        ${b.sfdc_corrections&&b.sfdc_corrections!=="null"&&b.sfdc_corrections.length>2?`
        <div class="d-sec">
          <div class="d-lbl">✏️ AE corrections to Salesforce data</div>
          <div class="d-txt warn">${b.sfdc_corrections}</div>
        </div>`:""}
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--g10);display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:10px;color:var(--g40)">Submitted by ${a.ae}</span>
          <span style="font-size:10px;color:var(--g40)">${b.submitted_at?new Date(b.submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</span>
        </div>
      </div>
    </div>
    `:`<div class="detail"><div class="d-body"><div class="no-brief">Brief not yet submitted by ${a.ae}. Check back after April 23.</div></div></div>`}
  `;

  // Entire card is clickable
  card.addEventListener("click",()=>{
    const isOpen=card.classList.toggle("open");
    if(isOpen){
      document.querySelectorAll(".ccard.open").forEach(c=>{
        if(c!==card){c.classList.remove("open")}
      });
      card.scrollIntoView({behavior:"smooth",block:"nearest"});
    }
  });

  return card;
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
document.querySelectorAll("[data-ev]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("[data-ev]").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on"); fev=btn.dataset.ev; render();
  });
});
document.querySelectorAll("[data-ex]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("[data-ex]").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on"); fex=btn.dataset.ex; render();
  });
});
document.getElementById("search-input").addEventListener("input",e=>{fq=e.target.value;render()});

loadBriefs();
</script>
</body>
</html>
