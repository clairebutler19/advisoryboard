// Avatar color palette — deterministic by name
const AVATAR_COLORS = [
  ["#0052F2","#EEF3FF"],["#16A34A","#F0FDF4"],["#D97706","#FFFBEB"],
  ["#7C3AED","#F5F3FF"],["#DB2777","#FDF2F8"],["#0891B2","#ECFEFF"],
  ["#374151","#F3F4F6"],["#DC2626","#FEF2F2"],
];
function avatarColor(name){
  const i=name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%AVATAR_COLORS.length;
  return AVATAR_COLORS[i];
}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();}

function Avatar({name,size=44}){
  const [color,bg]=avatarColor(name);
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:bg,border:`2px solid ${color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.32,fontWeight:700,color,flexShrink:0,fontFamily:B.font,letterSpacing:"0.02em"}}>
      {initials(name)}
    </div>
  );
}

const SHEETS_URL="https://script.google.com/a/macros/amplitude.com/s/AKfycbwAK-_cklDe-09YFZJ5P5Fz3ma7Cup4YSLT7431TnaGflLzD8WQRDL3mC4qDuB8H_TL/exec";

function hc(s){return s>=75?B.green:s>=55?B.amber:B.red;}
function hl(s){return s>=75?"Healthy":s>=55?"At Risk":"Critical";}

function Chip({label,color=B.blue,bg,small}){
  return <span style={{display:"inline-flex",alignItems:"center",padding:small?"1px 6px":"2px 9px",borderRadius:99,fontSize:small?9:11,fontWeight:700,color,background:bg||color+"14",fontFamily:B.font,whiteSpace:"nowrap",letterSpacing:"0.01em"}}>{label}</span>;
}

function Ring({score}){
  const c=hc(score),r=18,circ=2*Math.PI*r;
  return(
    <div style={{position:"relative",width:46,height:46,flexShrink:0}}>
      <svg viewBox="0 0 46 46" style={{transform:"rotate(-90deg)"}}>
        <circle cx="23" cy="23" r={r} fill="none" stroke={B.gray20} strokeWidth="5"/>
        <circle cx="23" cy="23" r={r} fill="none" stroke={c} strokeWidth="5" strokeDasharray={`${(score/100)*circ} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:c,fontFamily:B.font}}>{score}</div>
    </div>
  );
}

// ─── MANDATORY FIELD with "nothing to add" escape hatch ──────────────────────
function MandatoryField({label,hint,placeholder,value,onChange,skipped,onSkip,isLoading,onGenerate}){
  const filled=value.trim().length>4;
  const ok=filled||skipped;
  return(
    <div style={{marginBottom:16,opacity:skipped?0.55:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3,gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <label style={{fontSize:13,fontWeight:600,color:B.black,fontFamily:B.font}}>{label}</label>
          {!ok&&<span style={{fontSize:9,color:B.red,fontWeight:700,background:`${B.red}10`,padding:"1px 6px",borderRadius:99,fontFamily:B.font}}>REQUIRED</span>}
          {filled&&!skipped&&<span style={{fontSize:11,color:B.green}}>✓</span>}
          {skipped&&<span style={{fontSize:9,color:B.gray50,fontFamily:B.font,fontStyle:"italic"}}>skipped</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          {onGenerate&&!skipped&&(
            <button onClick={onGenerate} disabled={isLoading} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:6,border:`1px solid ${B.blue}22`,background:`${B.blue}0d`,color:B.blue,fontSize:11,fontWeight:600,cursor:isLoading?"default":"pointer",opacity:isLoading?0.5:1,fontFamily:B.font}}>
              {isLoading?<><span style={{display:"inline-block",width:10,height:10,border:`1.5px solid ${B.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>Drafting…</>:"✦ AI draft"}
            </button>
          )}
          <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:B.gray60,cursor:"pointer",userSelect:"none",fontFamily:B.font,whiteSpace:"nowrap"}}>
            <input type="checkbox" checked={skipped} onChange={e=>onSkip(e.target.checked)} style={{width:13,height:13,cursor:"pointer",accentColor:B.gray50}}/>
            Nothing to add
          </label>
        </div>
      </div>
      {hint&&<p style={{fontSize:11,color:B.gray50,margin:"0 0 5px",fontFamily:B.font}}>{hint}</p>}
      <textarea value={value} onChange={e=>onChange(e.target.value)} disabled={skipped}
        placeholder={skipped?"—":placeholder} rows={3}
        style={{width:"100%",background:skipped?B.gray10:B.white,border:`1.5px solid ${ok?filled?B.green:B.gray20:B.gray20}`,borderRadius:8,padding:"9px 11px",color:B.black,fontSize:13,lineHeight:1.55,resize:"vertical",outline:"none",fontFamily:B.font,boxSizing:"border-box",cursor:skipped?"not-allowed":"text",transition:"border-color 0.2s"}}
        onFocus={e=>{if(!skipped)e.target.style.borderColor=B.blue;}}
        onBlur={e=>{e.target.style.borderColor=filled&&!skipped?B.green:B.gray20;}}/>
    </div>
  );
}

      {(sfdc.recentActivity||[]).length>0&&(
        <div style={{border:`1px solid ${B.gray20}`,borderRadius:10,overflow:"hidden",background:B.white}}>
          <div style={{padding:"8px 13px",background:B.gray10,borderBottom:`1px solid ${B.gray20}`}}><span style={{fontSize:10,fontWeight:700,color:B.gray70,letterSpacing:"0.06em",fontFamily:B.font}}>⚡ RECENT SALESFORCE ACTIVITY (LAST 30 DAYS)</span></div>
          <div style={{padding:"10px 13px",display:"flex",flexDirection:"column",gap:10}}>
            {sfdc.recentActivity.map((a,i)=>(
              <div key={i} style={{display:"flex",gap:10}}>
                <span style={{fontSize:10,color:B.gray50,fontFamily:B.font,width:36,flexShrink:0,paddingTop:2,textAlign:"right"}}>{a.date}</span>
                <div style={{flex:1}}><Chip label={a.type} color={a.type==="Call Notes"?B.blue:B.gray60} small/><span style={{fontSize:12,color:B.black,fontFamily:B.font,lineHeight:1.4,marginLeft:6}}>{a.summary}</span></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function StepBar({current}){
  return(
    <div style={{display:"flex",alignItems:"center",marginBottom:24}}>
      {STEPS.map((s,i)=>{
        const done=i<current,active=i===current;
        return(
          <div key={s} style={{display:"flex",alignItems:"center",flex:1}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:done?B.green:active?B.blue:B.gray10,border:`2px solid ${done?B.green:active?B.blue:B.gray20}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:done||active?B.white:B.gray50,fontFamily:B.font}}>{done?"✓":i+1}</div>
              <span style={{fontSize:9,whiteSpace:"nowrap",color:active?B.blue:B.gray50,fontWeight:active?700:400,fontFamily:B.font}}>{s}</span>
            </div>
            {i<STEPS.length-1&&<div style={{flex:1,height:1.5,margin:"0 3px",marginBottom:18,background:i<current?B.green:B.gray20}}/>}
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const [ae,setAe]=useState("");
  const [customer,setCustomer]=useState(null);
  const [step,setStep]=useState(0);
  const [sfLoading,setSfLoading]=useState(false);
  const [sfReady,setSfReady]=useState(false);
  const [verified,setVerified]=useState(false);
  const [corrections,setCorrections]=useState("");
  const [aiLoading,setAiLoading]=useState({});
  const [submitting,setSubmitting]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const [submitError,setSubmitError]=useState(null);
  const [form,setForm]=useState({
    anecdote:"",anecdoteSkip:false,
    outcome:"",outcomeSkip:false,
    avoid:"",avoidSkip:false,
    wins:"",winsSkip:false,
    risks:"",risksSkip:false,
    peerMatches:[{customerId:"",reason:""},{customerId:"",reason:""}],
    execMatches:[],
    importantConvos:"",
  });

  const aeData=ae?AE_ROSTER[ae]:null;
  const customers=aeData?.customers||[];
  const sfdc=customer?(SFDC[customer.id]||null):null;
  const em=aeData?EVENT_META[aeData.event]:null;
  const execs=aeData?AMPLITUDE_EXECS[aeData.event]||[]:[];

  // ── SAME-EVENT PEER FILTERING ──────────────────────────────────────────────
  // Only show other attendees from the same event as the current customer
  const sameEventPeers = aeData
    ? Object.values(AE_ROSTER)
        .filter(d=>d.event===aeData.event)
        .flatMap(d=>d.customers)
        .filter(c=>c.id!==customer?.id)
        .sort((a,b)=>a.company.localeCompare(b.company))
    : [];

  function setField(k,v){setForm(p=>({...p,[k]:v}));}

  const intelComplete=["anecdote","outcome","avoid","wins"].every(k=>
    form[k].trim().length>4||form[k+"Skip"]
  );

  function pickAE(name){setAe(name);setCustomer(null);setSfReady(false);setVerified(false);setCorrections("");setStep(1);}
  function pickCustomer(c){
    setCustomer(c);setSfLoading(true);setSfReady(false);setVerified(false);setCorrections("");
    setForm({anecdote:"",anecdoteSkip:false,outcome:"",outcomeSkip:false,avoid:"",avoidSkip:false,wins:"",winsSkip:false,risks:"",risksSkip:false,peerMatches:[{customerId:"",reason:""},{customerId:"",reason:""}],execMatches:[],importantConvos:""});
    setTimeout(()=>{setSfLoading(false);setSfReady(true);},1400);
  }

  async function genAI(field){
    if(!customer)return;
    setAiLoading(p=>({...p,[field]:true}));
    const topicsStr=(sfdc?.topics||[]).length?"They submitted these topics at RSVP: "+(sfdc.topics.join("; "))+".":"";
    const activityStr=(sfdc?.recentActivity||[]).length?"Recent Salesforce activity: "+(sfdc.recentActivity.slice(0,2).map(a=>a.summary).join(" | "))+".":"";
    const ctx=`Account: ${customer.company}. Attendee: ${customer.name}, ${customer.title}. ARR: ${sfdc?.arr||"unknown"}. Products: ${(sfdc?.products||["Analytics"]).join(", ")}. Health score: ${sfdc?.health||75}/100. ${topicsStr} ${activityStr}`;
    const prompts={
      anecdote:`You are an AE prep coach at Amplitude. Based on this context: ${ctx} — write 2-3 specific, grounded conversation anecdotes or talking points for a customer advisory board. Reference their actual topics and recent activity where possible. Be natural, not corporate. Max 80 words.`,
      outcome:`Based on: ${ctx} — write 1-2 specific, achievable outcomes the AE should aim for at this event. Action-oriented. Max 60 words.`,
      avoid:`Based on: ${ctx} — list 2-3 specific topics to tactfully avoid. Be direct. Max 60 words.`,
    };
    try{
      // Note: AI drafts require a backend proxy with an API key.
      // For now, pre-fill with account context so AEs have a useful starting point.
      const lines = [];
      if(sfdc?.csNextSteps) lines.push("CS context: " + sfdc.csNextSteps.slice(0,200));
      if(sfdc?.topics?.length) lines.push("Their RSVP priorities: " + sfdc.topics.slice(0,3).join("; "));
      if(field==="anecdote") setField(field, "[Draft your talking points here — consider referencing their RSVP topics and recent Salesforce activity above]");
      else if(field==="outcome") setField(field, "[Describe the business goal you want their attendance to achieve — e.g. renewal commitment, expansion conversation, exec relationship]");
      else if(field==="avoid") setField(field, "[Note any topics, open issues, or sensitivities our exec team should avoid bringing up]");
    }catch{setField(field,"[Please fill in manually]");}
    finally{setAiLoading(p=>({...p,[field]:false}));}
  }

  async function handleSubmit(){
    setSubmitting(true);setSubmitError(null);
    const payload={
      ae_name:ae,
      event:aeData?.event,
      customer_name:customer?.name,
      customer_title:customer?.title,
      company:customer?.company,
      customer_id:customer?.id,
      arr:sfdc?.arr,
      health:sfdc?.health,
      sfdc_verified:verified,
      sfdc_corrections:corrections||null,
      anecdote:form.anecdoteSkip?"[skipped]":form.anecdote||null,
      outcome:form.outcomeSkip?"[skipped]":form.outcome||null,
      avoid:form.avoidSkip?"[skipped]":form.avoid||null,
      wins:form.winsSkip?"[skipped]":form.wins||null,
      risks:form.risksSkip?"[skipped]":form.risks||null,
      peer_matches:JSON.stringify(form.peerMatches.filter(m=>m.customerId).map(m=>{
        const peer=sameEventPeers.find(x=>x.id===m.customerId);
        return{name:peer?.name,company:peer?.company,reason:m.reason};
      })),
      exec_matches:JSON.stringify(form.execMatches.map(id=>{
        const e=execs.find(x=>x.id===id);
        return{id,name:e?.name,title:e?.title};
      })),
      important_convos:form.importantConvos||null,
      rsvp_topics:JSON.stringify(sfdc?.topics||[]),
      submitted_at:new Date().toISOString(),
    };
    try{
      // Google Sheets Apps Script doesn't support JSON POST with CORS cleanly,
      // so we use no-cors mode — the request goes through but we can't read the response.
      // This is fine — if the script is deployed correctly, it will always write the row.
      await fetch(SHEETS_URL,{
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify(payload),
      });
      setSubmitted(true);
    }catch(e){
      setSubmitError(`Submission failed: ${e.message}. Please reach out to claire.butler@amplitude.com.`);
    }finally{setSubmitting(false);}
  }

  if(submitted){
    return(
      <div style={{background:B.white,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,fontFamily:B.font}}>
        <style>{`@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}`}</style>
        <div style={{width:64,height:64,borderRadius:"50%",background:B.greenBg,border:`2px solid ${B.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:20,animation:"pop 0.4s ease"}}>✓</div>
        <h2 style={{fontSize:22,fontWeight:700,color:B.black,margin:"0 0 6px",textAlign:"center"}}>Brief submitted</h2>
        <p style={{fontSize:14,color:B.gray60,margin:"0 0 6px",textAlign:"center"}}>
          Your brief for <strong>{customer?.name}</strong> at <strong>{customer?.company}</strong> has been saved.
        </p>
        <p style={{fontSize:12,color:B.gray50,margin:"0 0 28px",textAlign:"center"}}>
          It will feed into the executive briefing view for {aeData?.event}.
        </p>
        <button onClick={()=>{setCustomer(null);setSfReady(false);setVerified(false);setSubmitted(false);setStep(1);}} style={{padding:"10px 22px",borderRadius:9,border:`1.5px solid ${B.blue}`,background:`${B.blue}0d`,color:B.blue,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:B.font,marginBottom:16}}>
          Submit another brief
        </button>
        <div style={{fontSize:11,color:B.gray50,textAlign:"center"}}>Questions? Reach out to <strong style={{color:B.blue}}>Claire Butler</strong></div>
      </div>
    );
  }

  return(
    <div style={{background:B.white,minHeight:"100vh",fontFamily:B.font}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}*{box-sizing:border-box}textarea,select,input{font-family:inherit}textarea::placeholder,input::placeholder{color:${B.gray30}}`}</style>

      {/* Header */}
      <div style={{borderBottom:`1px solid ${B.gray20}`,padding:"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",background:B.white,position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 0 rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="22" height="20" viewBox="0 0 22 20" fill="none"><path d="M11 0L22 20H0L11 0Z" fill={B.blue}/></svg>
          <div><div style={{fontSize:13,fontWeight:700,color:B.black}}>Amplitude</div><div style={{fontSize:10,color:B.gray50,marginTop:-2}}>AE Attendee Brief</div></div>
        </div>
        {aeData&&<Chip label={`${em?.icon} ${aeData.event}`} color={em?.color||B.blue} bg={em?.bg}/>}
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"26px 22px"}}>

        {/* ── STEP 0: SELECT AE ── */}
        {step===0&&(
          <div style={{animation:"up 0.35s ease"}}>
            <h1 style={{fontSize:24,fontWeight:700,color:B.black,margin:"0 0 6px",letterSpacing:"-0.4px"}}>Customer Attendee Brief</h1>
            <p style={{fontSize:13,color:B.gray60,margin:"0 0 28px"}}>Select your name to load your customers. We pull Salesforce data, Glean notes, and their submitted priorities automatically, and you will verify the inputs and add any color for our executives.</p>
            <label style={{fontSize:11,fontWeight:700,color:B.gray60,letterSpacing:"0.08em",display:"block",marginBottom:8}}>SELECT YOUR NAME</label>
            <div style={{position:"relative"}}>
              <select value={ae} onChange={e=>{if(e.target.value)pickAE(e.target.value);}} style={{width:"100%",background:B.white,border:`1.5px solid ${B.gray20}`,borderRadius:10,padding:"12px 40px 12px 14px",color:ae?B.black:B.gray50,fontSize:14,fontWeight:ae?600:400,outline:"none",cursor:"pointer",appearance:"none"}} onFocus={e=>e.target.style.borderColor=B.blue} onBlur={e=>e.target.style.borderColor=B.gray20}>
                <option value="">Choose your name…</option>
                <optgroup label="── San Diego CAB ──────────────">{Object.entries(AE_ROSTER).filter(([,v])=>v.event==="San Diego CAB").map(([n])=><option key={n} value={n}>{n}</option>)}</optgroup>
                <optgroup label="── San Diego EAB ──────────────">{Object.entries(AE_ROSTER).filter(([,v])=>v.event==="San Diego EAB").map(([n])=><option key={n} value={n}>{n}</option>)}</optgroup>
                <optgroup label="── London CAB ─────────────────">{Object.entries(AE_ROSTER).filter(([,v])=>v.event==="London CAB").map(([n])=><option key={n} value={n}>{n}</option>)}</optgroup>
                <optgroup label="── London EAB ──────────────────">{Object.entries(AE_ROSTER).filter(([,v])=>v.event==="London EAB").map(([n])=><option key={n} value={n}>{n}</option>)}</optgroup>
              </select>
              <svg style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 7L11 1" stroke={B.gray60} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div style={{marginTop:24,padding:"13px 15px",background:`${B.blue}08`,border:`1px solid ${B.blue}22`,borderRadius:10,display:"flex",gap:12}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:`${B.blue}14`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>📅</div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:B.black}}>Deadline: Thursday, April 23</div>
                <div style={{fontSize:11,color:B.gray60,marginTop:2}}>One brief per attending customer. Questions? <strong style={{color:B.blue}}>claire.butler@amplitude.com</strong></div>
              </div>
            </div>
          </div>
        )}

        {/* ── STEPS 1-4 ── */}
        {step>=1&&(
          <div style={{animation:"up 0.3s ease"}}>
            <StepBar current={step-1}/>

            {/* Customer picker */}
            {step===1&&!customer&&(
              <div>
                <h2 style={{fontSize:17,fontWeight:700,color:B.black,margin:"0 0 4px"}}>Your confirmed attendees</h2>
                <p style={{fontSize:13,color:B.gray60,margin:"0 0 16px"}}>Select a customer to start their brief. Submit one per person.</p>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {customers.map(c=>(
                    <button key={c.id} onClick={()=>pickCustomer(c)} style={{background:B.white,border:`1.5px solid ${B.gray20}`,borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left",fontFamily:B.font,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=B.blue;e.currentTarget.style.background=`${B.blue}05`;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=B.gray20;e.currentTarget.style.background=B.white;}}>
                      <Avatar name={c.name} size={48}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700,color:B.black}}>{c.name}</div>
                        <div style={{fontSize:12,color:B.gray60}}>{c.title}</div>
                        <div style={{fontSize:11,color:B.gray50,marginTop:1,fontWeight:600}}>{c.company}</div>
                      </div>
                      <span style={{fontSize:20,color:B.gray30}}>→</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Verify & review */}
            {step===1&&customer&&(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"12px 14px",background:B.gray10,borderRadius:10}}>
                  <Avatar name={customer.name} size={52}/>
                  <div>
                    <div style={{fontSize:16,fontWeight:700,color:B.black,fontFamily:B.font}}>{customer.name}</div>
                    <div style={{fontSize:12,color:B.gray60,fontFamily:B.font}}>{customer.title}</div>
                    <div style={{fontSize:12,fontWeight:600,color:B.black,fontFamily:B.font,marginTop:1}}>{customer.company}</div>
                  </div>
                </div>
                <p style={{fontSize:13,color:B.gray60,margin:"0 0 14px"}}>Data pulled from Salesforce — call notes, account health, and their RSVP topics. Review and verify or flag corrections.</p>
                {sfLoading?(
                  <div style={{padding:40,textAlign:"center"}}>
                    <div style={{width:28,height:28,border:`2.5px solid ${B.gray20}`,borderTopColor:B.blue,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 14px"}}/>
                    <p style={{color:B.gray60,fontSize:13,margin:0}}>Pulling Salesforce data, call notes & RSVP topics…</p>
                  </div>
                ):sfReady?(
                  <div>
                    {sfdc?(
                      <>
                        <div style={{border:`1px solid ${B.gray20}`,borderRadius:10,overflow:"hidden",marginBottom:10,background:B.white}}>
                          <div style={{padding:"8px 13px",background:B.gray10,borderBottom:`1px solid ${B.gray20}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:10,fontWeight:700,color:B.gray70,letterSpacing:"0.08em",fontFamily:B.font}}>SALESFORCE</span><Chip label="Live pull" color={B.blue}/></div>
                            {verified&&<Chip label="✓ Verified" color={B.green}/>}
                          </div>
                        </div>
                        <ContextPanel customer={customer} sfdc={sfdc}/>
                      </>
                    ):(
                      <div style={{padding:"14px 16px",background:B.gray10,borderRadius:10,border:`1px solid ${B.gray20}`,marginBottom:10}}>
                        <p style={{fontSize:12,color:B.gray60,margin:0,fontFamily:B.font}}>No Salesforce data found for {customer.company} in our demo data set. In production this would pull live from your Salesforce org.</p>
                      </div>
                    )}
                    {!verified&&(
                      <div style={{marginTop:10,padding:"12px 14px",background:B.gray10,borderRadius:10,border:`1px solid ${B.gray20}`}}>
                        <p style={{fontSize:12,color:B.gray60,margin:"0 0 10px",fontFamily:B.font}}>{sfdc?"Does all of this look accurate for":"No Salesforce data loaded for"} <strong>{customer.company}</strong>?</p>
                        <div style={{display:"flex",gap:8,marginBottom:8}}>
                          <button onClick={()=>setVerified(true)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${B.green}`,background:B.greenBg,color:B.green,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:B.font}}>✓ Looks correct</button>
                          <button onClick={()=>setVerified(false)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${B.gray30}`,background:"transparent",color:B.gray60,fontSize:12,cursor:"pointer",fontFamily:B.font}}>Flag corrections</button>
                        </div>
                        <textarea value={corrections} onChange={e=>setCorrections(e.target.value)} placeholder="Any corrections? ARR, renewal date, missing context, wrong contact…" rows={2} style={{width:"100%",background:B.white,border:`1px solid ${B.gray20}`,borderRadius:8,padding:"8px 10px",color:B.black,fontSize:12,resize:"vertical",outline:"none",fontFamily:B.font,boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=B.blue} onBlur={e=>e.target.style.borderColor=B.gray20}/>
                      </div>
                    )}
                    {verified&&<div style={{marginTop:10,padding:"10px 14px",background:B.greenBg,border:`1px solid ${B.green}33`,borderRadius:8,fontSize:12,color:B.green,fontFamily:B.font}}>✓ Context verified — ready to add your intel.</div>}
                  </div>
                ):null}
              </div>
            )}

            {/* Add intel — MANDATORY */}
            {step===2&&customer&&(
              <div>
                <h2 style={{fontSize:17,fontWeight:700,color:B.black,margin:"0 0 4px"}}>Add key requests</h2>
                <p style={{fontSize:13,color:B.gray60,margin:"0 0 6px"}}>Please fill in key talking points, desired outcomes, any hot button issues and anything else relevant for our executive team to know when interacting with your customer while on site.</p>
                <div style={{padding:"8px 12px",background:`${B.amber}0c`,border:`1px solid ${B.amber}33`,borderRadius:8,marginBottom:16,fontSize:11,color:B.amber,fontFamily:B.font}}>
                  ⓘ All fields must be filled or skipped before you can continue.
                </div>
                <MandatoryField label="Conversation anecdotes & talking points" hint="Best way to open or deepen a conversation with this person?" placeholder={`e.g. ${customer.name} mentioned they're rebuilding their analytics stack around…`} value={form.anecdote} onChange={v=>setField("anecdote",v)} skipped={form.anecdoteSkip} onSkip={v=>setField("anecdoteSkip",v)} isLoading={aiLoading.anecdote} onGenerate={()=>genAI("anecdote")}/>
                <MandatoryField label="Desired outcome from this event" hint="What business goals should be accomplished by their attendance?" placeholder="e.g. Secure commitment to expand to Experiment before renewal…" value={form.outcome} onChange={v=>setField("outcome",v)} skipped={form.outcomeSkip} onSkip={v=>setField("outcomeSkip",v)} isLoading={aiLoading.outcome} onGenerate={()=>genAI("outcome")}/>
                <MandatoryField label="Topics or areas to avoid" hint="What should our exec team NOT bring up with this customer?" placeholder="e.g. Don't mention the Q4 support escalation. Avoid discussing competitor X…" value={form.avoid} onChange={v=>setField("avoid",v)} skipped={form.avoidSkip} onSkip={v=>setField("avoidSkip",v)} isLoading={aiLoading.avoid} onGenerate={()=>genAI("avoid")}/>
                <MandatoryField label="Recent wins & account highlights" hint="What should the exec know to show up fully informed?" placeholder="e.g. Session Replay now live across 3 teams, 18% lift on onboarding…" value={form.wins} onChange={v=>setField("wins",v)} skipped={form.winsSkip} onSkip={v=>setField("winsSkip",v)} isLoading={false} onGenerate={null}/>
                {!intelComplete&&<div style={{padding:"8px 12px",background:`${B.red}08`,border:`1px solid ${B.red}22`,borderRadius:8,fontSize:11,color:B.red,fontFamily:B.font}}>↑ Fill in or skip all fields above to continue.</div>}
              </div>
            )}

            {/* Matchmaking */}
            {step===3&&(
              <div>
                <h2 style={{fontSize:17,fontWeight:700,color:B.black,margin:"0 0 4px"}}>Matchmaking</h2>
                <p style={{fontSize:13,color:B.gray60,margin:"0 0 18px"}}>Suggest peer connections and flag which Amplitude execs {customer?.name?.split(" ")[0]} should spend time with. Peer list is filtered to {aeData?.event} attendees only.</p>

                {/* Peer matches — same-event only */}
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:700,color:B.black,letterSpacing:"0.06em",marginBottom:10,fontFamily:B.font}}>PEER CUSTOMER CONNECTIONS</div>
                  {form.peerMatches.map((m,i)=>(
                    <div key={i} style={{background:B.gray10,borderRadius:10,border:`1px solid ${B.gray20}`,padding:12,marginBottom:10}}>
                      <div style={{fontSize:9,color:B.gray50,letterSpacing:"0.08em",marginBottom:8,fontFamily:B.font}}>SUGGESTED CONNECTION {i+1}</div>
                      <select value={m.customerId} onChange={e=>{const u=[...form.peerMatches];u[i]={...u[i],customerId:e.target.value};setField("peerMatches",u);}} style={{width:"100%",background:B.white,border:`1px solid ${B.gray20}`,borderRadius:8,padding:"7px 10px",color:B.black,fontSize:12,outline:"none",marginBottom:8,fontFamily:B.font}}>
                        <option value="">Select a {aeData?.event} attendee to connect with…</option>
                        {sameEventPeers.map(a=><option key={a.id} value={a.id}>{a.name} · {a.title} · {a.company}</option>)}
                      </select>
                      {m.customerId&&(()=>{
                        const peer=sameEventPeers.find(x=>x.id===m.customerId);
                        return peer?(
                          <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:B.white,borderRadius:7,border:`1px solid ${B.gray20}`,marginBottom:8}}>
                            <Avatar name={peer.name} size={36}/>
                            <div>
                              <div style={{fontSize:12,fontWeight:700,color:B.black,fontFamily:B.font}}>{peer.name}</div>
                              <div style={{fontSize:11,color:B.gray60,fontFamily:B.font}}>{peer.title} · {peer.company}</div>
                            </div>
                          </div>
                        ):null;
                      })()}
                      <textarea value={m.reason} onChange={e=>{const u=[...form.peerMatches];u[i]={...u[i],reason:e.target.value};setField("peerMatches",u);}} placeholder="Why connect? Shared industry, challenge, use case, or mutual interest?" rows={2} style={{width:"100%",background:B.white,border:`1px solid ${B.gray20}`,borderRadius:8,padding:"8px 10px",color:B.black,fontSize:12,lineHeight:1.5,resize:"none",outline:"none",fontFamily:B.font,boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=B.blue} onBlur={e=>e.target.style.borderColor=B.gray20}/>
                    </div>
                  ))}
                </div>

                {/* Exec checkboxes */}
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:700,color:B.black,letterSpacing:"0.06em",marginBottom:4,fontFamily:B.font}}>AMPLITUDE EXECS TO CONNECT WITH</div>
                  <p style={{fontSize:11,color:B.gray60,margin:"0 0 12px",fontFamily:B.font}}>Select any execs {customer?.name?.split(" ")[0]} should specifically spend time with at {aeData?.event}.</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {execs.map(exec=>{
                      const checked=form.execMatches.includes(exec.id);
                      return(
                        <div key={exec.id} onClick={()=>setField("execMatches",checked?form.execMatches.filter(x=>x!==exec.id):[...form.execMatches,exec.id])} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${checked?B.blue:B.gray20}`,background:checked?`${B.blue}07`:B.white,cursor:"pointer",transition:"all 0.15s",userSelect:"none"}}>
                          <Avatar name={exec.name} size={40}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:700,color:B.black,fontFamily:B.font,lineHeight:1.2}}>{exec.name}</div>
                            <div style={{fontSize:10,color:B.gray60,fontFamily:B.font,marginBottom:3}}>{exec.title}</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{exec.badges.map(b=><span key={b} style={{fontSize:9,padding:"1px 5px",borderRadius:99,background:B.blue,color:B.white,fontFamily:B.font,fontWeight:700}}>{b}</span>)}</div>
                          </div>
                          <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${checked?B.blue:B.gray30}`,background:checked?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                            {checked&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {form.execMatches.length>0&&(
                    <div style={{marginTop:10,padding:"8px 12px",background:`${B.blue}07`,border:`1px solid ${B.blue}22`,borderRadius:8,fontSize:11,color:B.blue,fontFamily:B.font}}>
                      ✓ {form.execMatches.length} exec{form.execMatches.length>1?"s":""} flagged: {form.execMatches.map(id=>execs.find(e=>e.id===id)?.name).filter(Boolean).join(", ")}
                    </div>
                  )}
                </div>

                {/* Important convos */}
                <div>
                  <label style={{fontSize:13,fontWeight:600,color:B.black,display:"block",marginBottom:4,fontFamily:B.font}}>Important conversations to engineer <span style={{fontSize:10,color:B.gray50,fontWeight:400}}>(optional)</span></label>
                  <textarea value={form.importantConvos} onChange={e=>setField("importantConvos",e.target.value)} placeholder={`e.g. Would love for ${customer?.name?.split(" ")[0]} to connect with our CPO on…`} rows={3} style={{width:"100%",background:B.white,border:`1px solid ${B.gray20}`,borderRadius:8,padding:"9px 11px",color:B.black,fontSize:13,lineHeight:1.55,resize:"vertical",outline:"none",fontFamily:B.font,boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=B.blue} onBlur={e=>e.target.style.borderColor=B.gray20}/>
                </div>
              </div>
            )}

            {/* Review & submit */}
            {step===4&&(
              <div>
                <h2 style={{fontSize:17,fontWeight:700,color:B.black,margin:"0 0 4px"}}>Review & submit</h2>
                <p style={{fontSize:13,color:B.gray60,margin:"0 0 16px"}}>Once submitted this brief is saved to our database and will feed into the executive briefing view before the event.</p>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:B.gray10,borderRadius:10,marginBottom:16}}>
                  <Avatar name={customer?.name||""} size={52}/>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:B.black,fontFamily:B.font}}>{customer?.name}</div>
                    <div style={{fontSize:12,color:B.gray60,fontFamily:B.font}}>{customer?.title} · {customer?.company}</div>
                    <Chip label={aeData?.event||""} color={em?.color||B.blue} bg={em?.bg}/>
                  </div>
                </div>
                {[
                  {l:"ARR",v:sfdc?.arr||"—"},{l:"Health score",v:sfdc?`${sfdc.health}/100 (${hl(sfdc.health)})`:"-"},
                  {l:"Desired outcome",v:form.outcomeSkip?"[skipped]":form.outcome},
                  {l:"Talking points",v:form.anecdoteSkip?"[skipped]":form.anecdote},
                  {l:"Topics to avoid",v:form.avoidSkip?"[skipped]":form.avoid},
                  {l:"Recent wins",v:form.winsSkip?"[skipped]":form.wins},
                  {l:"Peer matches",v:form.peerMatches.filter(m=>m.customerId).map(m=>sameEventPeers.find(x=>x.id===m.customerId)?.name).filter(Boolean).join(", ")||"None"},
                  {l:"Exec matches",v:form.execMatches.map(id=>execs.find(e=>e.id===id)?.name).filter(Boolean).join(", ")||"None"},
                ].map(row=>(
                  <div key={row.l} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:`1px solid ${B.gray10}`}}>
                    <div style={{width:120,flexShrink:0,color:B.gray50,fontSize:11,fontFamily:B.font,paddingTop:1}}>{row.l}</div>
                    <div style={{flex:1,color:row.v&&row.v!=="—"&&row.v!=="None"?B.black:B.gray30,fontStyle:row.v&&row.v!=="—"&&row.v!=="None"?"normal":"italic",lineHeight:1.5,fontSize:13,fontFamily:B.font}}>{row.v||"Not provided"}</div>
                  </div>
                ))}
                {submitError&&<div style={{marginTop:14,padding:"10px 12px",background:`${B.red}0a`,border:`1px solid ${B.red}33`,borderRadius:8,fontSize:12,color:B.red,fontFamily:B.font}}>{submitError}</div>}
              </div>
            )}

            {/* Nav buttons */}
            <div style={{display:"flex",justifyContent:"space-between",marginTop:24,paddingTop:18,borderTop:`1px solid ${B.gray20}`}}>
              <button onClick={()=>{
                if(step===1&&customer){setCustomer(null);setSfReady(false);setVerified(false);}
                else if(step===1&&!customer){setAe("");setStep(0);}
                else setStep(s=>s-1);
              }} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${B.gray20}`,background:"transparent",color:B.gray60,fontSize:13,cursor:"pointer",fontFamily:B.font}}>← Back</button>

              {step===1&&customer&&(
                <button onClick={()=>setStep(2)} disabled={!verified&&corrections.length===0} style={{padding:"8px 22px",borderRadius:8,border:"none",background:verified||corrections.length>0?B.blue:B.gray20,color:verified||corrections.length>0?B.white:B.gray50,fontSize:13,fontWeight:600,cursor:verified||corrections.length>0?"pointer":"default",fontFamily:B.font}}>Continue →</button>
              )}
              {step===2&&(
                <button onClick={()=>setStep(3)} disabled={!intelComplete} style={{padding:"8px 22px",borderRadius:8,border:"none",background:intelComplete?B.blue:B.gray20,color:intelComplete?B.white:B.gray50,fontSize:13,fontWeight:600,cursor:intelComplete?"pointer":"default",fontFamily:B.font}}>Continue →</button>
              )}
              {step===3&&(
                <button onClick={()=>setStep(4)} style={{padding:"8px 22px",borderRadius:8,border:"none",background:B.blue,color:B.white,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:B.font}}>Review brief →</button>
              )}
              {step===4&&(
                <button onClick={handleSubmit} disabled={submitting} style={{padding:"8px 24px",borderRadius:8,border:"none",background:submitting?B.gray50:B.blue,color:B.white,fontSize:13,fontWeight:600,cursor:submitting?"default":"pointer",fontFamily:B.font,display:"flex",alignItems:"center",gap:8}}>
                  {submitting&&<span style={{display:"inline-block",width:12,height:12,border:"2px solid white",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>}
                  {submitting?"Submitting…":"Submit brief →"}
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


    const domContainer = document.getElementById('root');
    const root = ReactDOM.createRoot(domContainer);
    root.render(React.createElement(App));
  </script>
</body>
</html>
